apiVersion: apps/v1
kind: Deployment
metadata:
  name: tic-tac-toe
  namespace: production
  labels:
    app: tic-tac-toe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tic-tac-toe
  template:
    metadata:
      labels:
        app: tic-tac-toe
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
        - name: tic-tac-toe
          image: ghcr.io/garbaa/devsecops-demo:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 80
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
