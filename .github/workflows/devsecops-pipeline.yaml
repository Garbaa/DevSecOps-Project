name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  security-events: write
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SonarQube Scan (Code Quality & Security)
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

      # 2. OWASP Dependency Check (SCA)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'DevSecOps-Project'
          path: '.'
          format: 'HTML'
          out: 'reports'
        continue-on-error: true

      # 3. Trivy Filesystem Scan
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
        continue-on-error: true

      # 4. Build Docker Image
      - name: Build Docker Image
        run: docker build -t devsecops-demo:latest .

      # 5. Trivy Image Scan
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo:latest'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
        continue-on-error: true

      # 6. Checkov IaC Scan
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./kubernetes
          framework: kubernetes
          output_format: cli,sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      # 7. Upload Trivy FS Results
      - name: Upload Trivy FS Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
        continue-on-error: true

      # 8. Upload Trivy Image Results
      - name: Upload Trivy Image Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
        continue-on-error: true

      # 9. Upload Checkov Results
      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-results.sarif
        continue-on-error: true

      # 10. Upload OWASP Report as Artifact
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports