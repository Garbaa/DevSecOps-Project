name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  security-events: write
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/garbaa/devsecops-demo
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Security Scans
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SonarQube Scan (SAST)
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

      # 2. Secret Scanning
      - name: Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # 3. OWASP Dependency Check (SCA)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'DevSecOps-Project'
          path: '.'
          format: 'HTML'
          out: 'reports'
        continue-on-error: true

      # 4. Trivy Filesystem Scan
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
        continue-on-error: true

      # 5. Checkov IaC Scan
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./kubernetes
          framework: kubernetes
          output_format: cli,sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      # 6. Upload SARIF Results
      - name: Upload Trivy FS Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
        continue-on-error: true

      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-results.sarif
          category: checkov
        continue-on-error: true

      # 7. Upload OWASP Report
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  # ─────────────────────────────────────────
  # JOB 2 — Build & Push Docker Image
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest

      # Trivy Image Scan
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
        continue-on-error: true

      - name: Upload Trivy Image Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image
        continue-on-error: true

      # Login & Push to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push Docker Image to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # JOB 3 — GitOps: Update K8s Manifest
  # ─────────────────────────────────────────
  update-k8s:
    name: Update Kubernetes Deployment (GitOps)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Setup Git Config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update Kubernetes Deployment Image Tag
        env:
          REGISTRY: ghcr.io
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          NEW_IMAGE="${REGISTRY}/${GITHUB_REPOSITORY}:${{ env.IMAGE_TAG }}"
          sed -i "s|image: ${REGISTRY}/.*|image: ${NEW_IMAGE}|g" kubernetes/deployment.yaml
          echo "Updated deployment to use image: ${NEW_IMAGE}"
          grep -A 1 "image:" kubernetes/deployment.yaml

      - name: Commit and Push Changes
        run: |
          git add kubernetes/deployment.yaml
          git commit -m "gitops: update image tag to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git push

  # ─────────────────────────────────────────
  # JOB 4 — DAST (OWASP ZAP)
  # ─────────────────────────────────────────
  dast:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: [update-k8s]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Start app locally for ZAP to scan
      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Serve App Locally
        run: |
          npm install -g serve
          serve -s dist -l 3000 &
          sleep 5

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          cmd_options: '-a'
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
        continue-on-error: true
